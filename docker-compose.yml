# =====================================================================
# Timelock Backend Docker Compose
#
# 配置策略：
#   1. 所有敏感数据 / 跨环境差异都从根目录 .env 读取（env_file: .env）。
#   2. 镜像里自带的 /app/config.yaml 提供默认值（端口、刷新间隔、SMTP host 等）。
#   3. 这里只显式 override 两类东西：
#        a) docker 内才需要改的 *_HOST（指向服务名 postgres / redis）
#        b) 不在 .env 中、又必须随 docker 部署变的非敏感项
#   4. 不再重复列出 .env 中已有的所有变量，避免双向漂移。
#
# .env 命名规则约定见 env.example。
# =====================================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: timelocker-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - timelocker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis 缓存
  redis:
    image: redis:8-alpine
    container_name: timelocker-redis
    restart: unless-stopped
    env_file:
      - .env
    # 用 sh -c 让 ${REDIS_PASSWORD} 由容器内 shell 展开，避免 compose 解析时密码外泄到 ps
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - timelocker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Timelock 后端应用
  timelocker-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timelocker-backend
    restart: unless-stopped
    env_file:
      - .env
    # 只覆盖 docker 内才不同的几个 host / 容器内连接地址。
    # 其它默认值（端口、刷新间隔、SMTP host、Goldsky 配置等）走镜像里的 config.yaml。
    environment:
      DATABASE_HOST: postgres
      DATABASE_USER: ${POSTGRES_USER:-timelocker}
      DATABASE_DBNAME: ${POSTGRES_DB:-timelocker_db}
      REDIS_HOST: redis
    networks:
      - timelocker-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs/timelocker-backend:/var/log/timelocker
      - ./backups:/app/backups
      # 如果想用本地 config.yaml 临时覆盖镜像默认，把下一行解注：
      # - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Caddy 反向代理和 HTTPS 服务
  caddy:
    image: caddy:2-alpine
    container_name: timelocker-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./logs/caddy:/var/log/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - timelocker-network
    depends_on:
      timelocker-backend:
        condition: service_healthy
    environment:
      CADDY_ADMIN: 0.0.0.0:2019
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # PostgreSQL 备份调度器（简化版本）
  backup-scheduler:
    image: postgres:16-alpine
    container_name: timelocker-backup-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      TZ: UTC
    volumes:
      - ./backups:/backups
      - ./logs/backup-scheduler:/var/log
    command: >
      sh -c "
        echo 'TimeLocker PostgreSQL Backup Scheduler Starting...';
        mkdir -p /backups;

        echo '#!/bin/sh' > /backup.sh;
        echo 'TIMESTAMP=$$(date +%Y%m%d_%H%M%S)' >> /backup.sh;
        echo 'BACKUP_FILE=/backups/scheduled_backup_$$TIMESTAMP.sql' >> /backup.sh;
        echo 'echo \"[$$TIMESTAMP] Starting scheduled backup...\"' >> /backup.sh;
        echo 'if pg_dump -h $$POSTGRES_HOST -p $$POSTGRES_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB > $$BACKUP_FILE; then' >> /backup.sh;
        echo '  echo \"[$$TIMESTAMP] Backup successful: $$BACKUP_FILE\"' >> /backup.sh;
        echo '  ls -lh $$BACKUP_FILE' >> /backup.sh;
        echo 'else' >> /backup.sh;
        echo '  echo \"[$$TIMESTAMP] Backup failed\"' >> /backup.sh;
        echo '  rm -f $$BACKUP_FILE' >> /backup.sh;
        echo 'fi' >> /backup.sh;

        echo '#!/bin/sh' > /cleanup.sh;
        echo 'TIMESTAMP=$$(date +%Y%m%d_%H%M%S)' >> /cleanup.sh;
        echo 'echo \"[$$TIMESTAMP] Starting backup cleanup...\"' >> /cleanup.sh;
        echo 'find /backups -name \"*.sql\"    -mtime +$${BACKUP_RETENTION_DAYS:-30} -delete 2>/dev/null || true' >> /cleanup.sh;
        echo 'find /backups -name \"*.dump\"   -mtime +$${BACKUP_RETENTION_DAYS:-30} -delete 2>/dev/null || true' >> /cleanup.sh;
        echo 'find /backups -name \"*.tar.gz\" -mtime +$${BACKUP_RETENTION_DAYS:-30} -delete 2>/dev/null || true' >> /cleanup.sh;
        echo 'echo \"[$$TIMESTAMP] Cleanup completed\"' >> /cleanup.sh;

        chmod +x /backup.sh /cleanup.sh;

        echo '# TimeLocker PostgreSQL Backup Tasks' > /var/spool/cron/crontabs/root;
        echo '0 2 * * * PGPASSWORD=$$POSTGRES_PASSWORD /backup.sh >> /var/log/backup.log 2>&1' >> /var/spool/cron/crontabs/root;
        echo '0 3 * * 0 /cleanup.sh >> /var/log/backup.log 2>&1' >> /var/spool/cron/crontabs/root;

        chmod 600 /var/spool/cron/crontabs/root;

        echo 'Backup Strategy: Daily at 2AM, Cleanup weekly on Sunday at 3AM';
        echo 'Starting cron daemon...';

        crond -f -d 8
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - timelocker-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  timelocker-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
